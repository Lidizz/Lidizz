# .github/workflows/bento.yml
#
# Fetches live Oslo weather from met.no locationforecast 2.0
# Regenerates slim bento SVGs (weather + focus) hourly.
# Includes timestamp of last fetch in the SVG.

name: Update Bento Weather

on:
  schedule:
    - cron: "0 * * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-bento:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Oslo weather from met.no
        id: weather
        run: |
          python3 << 'EOF'
          import urllib.request, json, os
          from datetime import datetime, timezone

          url = "https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=59.91&lon=10.75"
          req = urllib.request.Request(url, headers={
              "User-Agent": "github.com/Lidizz/Lidizz profile readme"
          })
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())

          ts     = data["properties"]["timeseries"][0]
          inst   = ts["data"]["instant"]["details"]
          next1h = ts["data"].get("next_1_hours", {})

          temp_c = round(inst["air_temperature"])
          temp   = f"{temp_c}°C"
          symbol = next1h.get("summary", {}).get("symbol_code", "cloudy")

          # Single-emoji map — no doubles
          EMOJI_MAP = {
              "clearsky_day":            "☀️",
              "clearsky_night":          "🌙",
              "clearsky_polartwilight":  "🌅",
              "fair_day":                "🌤️",
              "fair_night":              "🌙",
              "partlycloudy_day":        "⛅",
              "partlycloudy_night":      "🌙",
              "cloudy":                  "☁️",
              "fog":                     "🌫️",
              "lightfog":                "🌫️",
              "lightrainshowers_day":    "🌦️",
              "lightrainshowers_night":  "🌧️",
              "rainshowers_day":         "🌧️",
              "rainshowers_night":       "🌧️",
              "heavyrainshowers_day":    "🌧️",
              "heavyrainshowers_night":  "🌧️",
              "lightrain":               "🌦️",
              "rain":                    "🌧️",
              "heavyrain":               "🌧️",
              "lightsleetshowers_day":   "🌨️",
              "lightsleetshowers_night": "🌨️",
              "sleetshowers_day":        "🌨️",
              "sleetshowers_night":      "🌨️",
              "lightsleet":              "🌨️",
              "sleet":                   "🌨️",
              "lightsnowshowers_day":    "🌨️",
              "lightsnowshowers_night":  "❄️",
              "snowshowers_day":         "🌨️",
              "snowshowers_night":       "❄️",
              "lightsnow":               "❄️",
              "snow":                    "❄️",
              "heavysnow":               "❄️",
              "thunder":                 "⛈️",
              "rainandthunder":          "⛈️",
              "lightrainandthunder":     "⛈️",
              "heavyrainandthunder":     "⛈️",
              "sleetandthunder":         "⛈️",
              "snowandthunder":          "⛈️",
              "lightrainshowersandthunder_day":   "⛈️",
              "lightrainshowersandthunder_night":  "⛈️",
          }

          emoji = EMOJI_MAP.get(symbol)
          if not emoji:
              base  = symbol.replace("_day","").replace("_night","").replace("_polartwilight","")
              emoji = EMOJI_MAP.get(base, "🌡️")

          # Human-readable condition with proper spacing
          base = symbol.replace("_day","").replace("_night","").replace("_polartwilight","")
          COND_MAP = {
              "clearsky":        "Clear sky",
              "fair":            "Fair",
              "partlycloudy":    "Partly cloudy",
              "cloudy":          "Cloudy",
              "fog":             "Fog",
              "lightfog":        "Light fog",
              "lightrain":       "Light rain",
              "rain":            "Rain",
              "heavyrain":       "Heavy rain",
              "lightrainshowers":"Light showers",
              "rainshowers":     "Showers",
              "heavyrainshowers":"Heavy showers",
              "lightsleet":      "Light sleet",
              "sleet":           "Sleet",
              "lightsleetshowers":"Light sleet showers",
              "sleetshowers":    "Sleet showers",
              "lightsnow":       "Light snow",
              "snow":            "Snow",
              "heavysnow":       "Heavy snow",
              "lightsnowshowers":"Light snow showers",
              "snowshowers":     "Snow showers",
              "thunder":         "Thunder",
              "rainandthunder":  "Rain and thunder",
              "lightrainandthunder": "Light rain, thunder",
              "heavyrainandthunder": "Heavy rain, thunder",
              "sleetandthunder": "Sleet and thunder",
              "snowandthunder":  "Snow and thunder",
              "lightrainshowersandthunder": "Showers and thunder",
          }
          condition = COND_MAP.get(base, base.capitalize())

          # Timestamp — HH:MM UTC
          now = datetime.now(timezone.utc)
          timestamp = now.strftime("%H:%M UTC")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"TEMP={temp}\n")
              f.write(f"CONDITION={condition}\n")
              f.write(f"EMOJI={emoji}\n")
              f.write(f"TIMESTAMP={timestamp}\n")

          print(f"Weather: {emoji} {temp} — {condition} ({timestamp})")
          EOF

      - name: Regenerate bento SVGs
        run: |
          python3 .github/scripts/gen_bento.py dark \
            "${{ steps.weather.outputs.TEMP }}" \
            "${{ steps.weather.outputs.CONDITION }}" \
            "${{ steps.weather.outputs.EMOJI }}" \
            "${{ steps.weather.outputs.TIMESTAMP }}" \
            > bento-dark.svg

          python3 .github/scripts/gen_bento.py light \
            "${{ steps.weather.outputs.TEMP }}" \
            "${{ steps.weather.outputs.CONDITION }}" \
            "${{ steps.weather.outputs.EMOJI }}" \
            "${{ steps.weather.outputs.TIMESTAMP }}" \
            > bento-light.svg

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bento-dark.svg bento-light.svg
          git diff --cached --quiet || git commit -m "chore: update bento weather [skip ci]"
          git push
