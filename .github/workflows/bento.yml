# .github/workflows/bento.yml
#
# Fetches live Oslo weather from met.no locationforecast 2.0
# and regenerates bento-dark.svg and bento-light.svg hourly.
#
# met.no returns symbol_code which encodes both weather AND
# day/night — so icons automatically reflect actual conditions.
#
# TRIGGERS:
#   - Every hour
#   - On every push to main
#   - Manually via Actions tab

name: Update Bento Weather

on:
  schedule:
    - cron: "0 * * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-bento:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Oslo weather from met.no
        id: weather
        run: |
          python3 << 'EOF'
          import urllib.request, json, os

          # met.no locationforecast 2.0 — Oslo coords
          url = "https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=59.91&lon=10.75"
          req = urllib.request.Request(url, headers={
              "User-Agent": "github.com/Lidizz/Lidizz profile readme (lidor-shachar on LinkedIn)"
          })
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())

          # First timeseries entry = current conditions
          ts   = data["properties"]["timeseries"][0]
          inst = ts["data"]["instant"]["details"]
          next1h = ts["data"].get("next_1_hours", {})

          temp_c = round(inst["air_temperature"])
          temp   = f"{temp_c}°C"

          # symbol_code encodes weather + day/night e.g. "clearsky_night"
          symbol = next1h.get("summary", {}).get("symbol_code", "cloudy")

          # Map symbol_code to emoji — day/night aware
          EMOJI_MAP = {
              "clearsky_day":           "☀️",
              "clearsky_night":         "🌙",
              "clearsky_polartwilight": "🌅",
              "fair_day":               "🌤️",
              "fair_night":             "🌙",
              "partlycloudy_day":       "⛅",
              "partlycloudy_night":     "☁️🌙",
              "cloudy":                 "☁️",
              "fog":                    "🌫️",
              "lightrain":              "🌦️",
              "lightrain_day":          "🌦️",
              "lightrain_night":        "🌧️",
              "rain":                   "🌧️",
              "heavyrain":              "🌧️",
              "lightrainshowers_day":   "🌦️",
              "lightrainshowers_night": "🌧️",
              "rainshowers_day":        "🌧️",
              "rainshowers_night":      "🌧️",
              "heavyrainshowers_day":   "🌧️",
              "heavyrainshowers_night": "🌧️",
              "lightsleet":             "🌨️",
              "sleet":                  "🌨️",
              "lightsleetshowers_day":  "🌨️",
              "lightsleetshowers_night":"🌨️",
              "lightsnow":              "❄️",
              "snow":                   "❄️",
              "heavysnow":              "❄️",
              "lightsnowshowers_day":   "🌨️",
              "lightsnowshowers_night": "❄️",
              "snowshowers_day":        "🌨️",
              "snowshowers_night":      "❄️",
              "thunder":                "⛈️",
              "rainandthunder":         "⛈️",
              "lightrainandthunder":    "⛈️",
              "snowandthunder":         "⛈️",
          }

          # Fallback: strip _day/_night and try base symbol
          emoji = EMOJI_MAP.get(symbol)
          if not emoji:
              base = symbol.replace("_day","").replace("_night","").replace("_polartwilight","")
              emoji = EMOJI_MAP.get(base, "🌡️")

          # Human-readable condition from symbol (strip _day/_night)
          condition = symbol.replace("_day","").replace("_night","").replace("_polartwilight","")
          condition = condition.replace("_"," ").capitalize()

          # Write to GITHUB_OUTPUT
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"TEMP={temp}\n")
              f.write(f"CONDITION={condition}\n")
              f.write(f"EMOJI={emoji}\n")

          print(f"Weather: {emoji} {temp} — {condition} (symbol: {symbol})")
          EOF

      - name: Regenerate bento SVGs
        run: |
          python3 .github/scripts/gen_bento.py dark \
            "${{ steps.weather.outputs.TEMP }}" \
            "${{ steps.weather.outputs.CONDITION }}" \
            "${{ steps.weather.outputs.EMOJI }}" \
            > bento-dark.svg

          python3 .github/scripts/gen_bento.py light \
            "${{ steps.weather.outputs.TEMP }}" \
            "${{ steps.weather.outputs.CONDITION }}" \
            "${{ steps.weather.outputs.EMOJI }}" \
            > bento-light.svg

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bento-dark.svg bento-light.svg
          git diff --cached --quiet || git commit -m "chore: update bento weather [skip ci]"
          git push
