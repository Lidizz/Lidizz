# .github/workflows/bento.yml
#
# Fetches live Oslo weather from wttr.in and regenerates
# bento-dark.svg and bento-light.svg with the latest data.
#
# TRIGGERS:
#   - Every hour
#   - On every push to main
#   - Manually via Actions tab (workflow_dispatch)

name: Update Bento Weather

on:
  schedule:
    - cron: "0 * * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-bento:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Checkout repo ─────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Fetch Oslo weather from wttr.in JSON API ──────────
      - name: Fetch weather
        id: weather
        run: |
          # Fetch JSON from wttr.in
          DATA=$(curl -s "https://wttr.in/Oslo?format=j1")

          # Extract temperature in Celsius
          TEMP=$(echo "$DATA" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d['current_condition'][0]['temp_C'] + '°C')
          ")

          # Extract weather description
          CONDITION=$(echo "$DATA" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d['current_condition'][0]['weatherDesc'][0]['value'])
          ")

          # Map weather code to emoji
          EMOJI=$(echo "$DATA" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          code = int(d['current_condition'][0]['weatherCode'])
          if code == 113:   emoji = '☀️'
          elif code == 116: emoji = '⛅'
          elif code == 119: emoji = '☁️'
          elif code == 122: emoji = '☁️'
          elif code in [143,248,260]: emoji = '🌫️'
          elif code in [176,263,266,293,296,299,302,305,308,311,314,317,350,353,356,359]: emoji = '🌧️'
          elif code in [179,182,185,227,230,320,323,326,329,332,335,338,368,371,374,377]: emoji = '❄️'
          elif code in [200,386,389,392,395]: emoji = '⛈️'
          else: emoji = '🌡️'
          print(emoji)
          ")

          echo "TEMP=$TEMP"         >> $GITHUB_OUTPUT
          echo "CONDITION=$CONDITION" >> $GITHUB_OUTPUT
          echo "EMOJI=$EMOJI"       >> $GITHUB_OUTPUT

      # ── 3. Regenerate SVGs with live weather ─────────────────
      - name: Regenerate bento SVGs
        run: |
          python3 .github/scripts/gen_bento.py dark \
            "${{ steps.weather.outputs.TEMP }}" \
            "${{ steps.weather.outputs.CONDITION }}" \
            "${{ steps.weather.outputs.EMOJI }}" \
            > bento-dark.svg

          python3 .github/scripts/gen_bento.py light \
            "${{ steps.weather.outputs.TEMP }}" \
            "${{ steps.weather.outputs.CONDITION }}" \
            "${{ steps.weather.outputs.EMOJI }}" \
            > bento-light.svg

      # ── 4. Commit and push if changed ────────────────────────
      - name: Commit updated bentos
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bento-dark.svg bento-light.svg
          git diff --cached --quiet || git commit -m "chore: update bento weather [skip ci]"
          git push
