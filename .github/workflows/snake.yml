# .github/workflows/snake.yml
#
# Generates a contribution snake SVG animation from your real GitHub
# contribution graph and commits it to the `output` branch.
#
# The README.md embeds it via:
#   <picture>
#     <source media="(prefers-color-scheme: dark)"
#       srcset="...output/github-contribution-grid-snake-dark.svg" />
#     <source media="(prefers-color-scheme: light)"
#       srcset="...output/github-contribution-grid-snake.svg" />
#     <img src="...output/github-contribution-grid-snake.svg" />
#   </picture>
#
# HOW IT WORKS:
#   1. Fetches your real contribution data via the GitHub GraphQL API
#   2. Computes a complete traversal path through every active cell
#   3. Renders the snake eating each cell as a pre-baked animated SVG
#   4. Commits the SVG to the `output` branch of this repo
#   5. The README's <picture> tag serves dark or light version
#      automatically based on the visitor's OS/browser theme
#
# TRIGGERS:
#   - Every day at 06:00 UTC (cron)
#   - On every push to main (so new contributions show quickly)
#   - Manually via GitHub Actions UI (workflow_dispatch)

name: Generate Snake Animation

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  push:
    branches:
      - main
  workflow_dispatch:       # manual trigger from Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Generate both light and dark SVGs ─────────────────────
      - name: Generate contribution snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Lidizz

          # Light theme output
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # ── 2. Push the SVG files to the `output` branch ─────────────
      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
